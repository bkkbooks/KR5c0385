body:
  text: 老子説略卷下濟陽張爾岐撰下篇上德不德是以有德下德不失德是以無德上德無為而無以為下德為之而有以為上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此德之上者不自有其德是以有德德之下者勉強執持而不失其德是以德未至而無德其中存之不同如此德之上者無所作為非故無為也率德之自然而已無餘事無所用為也德之下者則為之矣然慮而後獲為而後成實不得不出於為也其發用之不同如此德者道備於身之稱若夫一德著聞者有上仁焉有上義焉有上禮焉上仁事主於愛不能無為矣為之而生於心之不自已實無所勉而為之也上義事主於宜不能無為矣謂其宜也而為之是有以為也上禮以文飾情情積於中則為禮以達之然節文詳縟非衆之所必能也為禮而莫之應者有矣莫之應則不免攘臂而仍之又非僅有為而已也故失道而後德失德而後仁失仁而後義失義而後禮凡自道五降而後至於禮也夫禮者文也文勝則情衰禮者讓也讓不應則爭起禮豈非忠信之薄而亂之首乎人之前識者聰明外耀矜外則遺內推索過勞明過則生惑前識者豈非道之華而愚之始乎薄以生亂華以致愚如此是以大丈夫處其厚不處其薄居其實不居其華故去彼智禮而取此道德也昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以為貞而貴髙將恐蹶故貴以賤為本髙以下為基是以侯王自稱孤寡不穀此其以賤為本邪非乎故致數輿無輿不欲琭琭如玉落落如石昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞雖有天地人物之殊其不可不致此一則同也使天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而徒居髙貴之勢將恐蹶甚矣一之不可不致也侯王之致一者如何亦曰不自貴不自髙而已貴者以賤為本髙者以下為基如之何可以自貴自髙也是以侯王自謂孤寡不穀以賤者自名此其不自貴而以賤為本耶非乎天下之勢合衆賤以成貴如車之合輪轅軫蓋以成車非賤則無貴如致數輿則無輿侯王能忘其貴忘其髙乃可以為天下貞耳不欲琭琭如玉落落如石過為分别也反者道之動弱者道之用天下之物生於有有生於無人不外馳而內反即入道之肇端反者道之動也有道者必不與物競而自處弱弱者道之用也所以然者蓋以天下之物皆生於有而有則生於無無者道之本然也反者捨有而趨無以有趨無故云道之動也及其與道為一無靜可名何有於動乎弱者有而不離於無不離於無故云道之用也若究其體則亦無而已矣上士聞道勤而行之中士聞道若存若亡下士聞道大之不不足以為道故建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質真若渝大方無隅大器晚成大音希聲大象無形道隱無名夫惟道善貸且成上士聞道勤而行之中士聞道若存若亡而已不能必行也下士聞道則大之不為下士所笑不足以為道何也古之建言者有之矣曰明道者自明而已不與世競明故若昧進道者自進而已不與世競進故若退夷道者與世無所不平雖非人之所及也而與人若類上德者不自有其德其卑下若谷大白者不離染以為白其同塵若辱廣德者不自以為廣常若有所不足建德者勤於治性接物必簡故見為茍且而若偷質真者任天而遊無所執著故見為不常而若渝大方正內而行無事矜暴故不見其廉隅大器晚成其成不可遽見大音希聲其聲不可得聞大象無形其形不可得容此豈中下之人計量之所能至安得不非之哉蓋道之本體隱而難見無所可名及其發見於物則惟道善貸而且善成萬物並受其賜而又未能知之其取於下士宜耳道生一一生二二生三三生萬物萬物負隂而抱陽沖氣以為和人之所惡惟孤寡不穀而王公以為稱故物或損之而益或益之而損人之所教我亦教之強梁者不得其死吾將以為教父道生一一生二無名天地之始也二生三三生萬物有名萬物之母也萬物皆負隂而抱陽沖氣以為和孰非道之生之成之者乎人之所惡惟孤寡不穀而制名者使王公自以為稱欲其貴而不忘賤髙而不忘下也故物或損之而適以益或益之而反以損謙與滿之所自招也古人之所以教人者我亦取其言為教有曰強梁者不得其死豈非自益而反大損者乎是言也吾將以為教人之主此章沖氣為和以上似承善貸且成而言與下假文義不屬或有脫誤不可知解者皆牽合耳道謂理一謂氣二謂隂與陽三謂隂與陽與隂陽會合之氣即下文所云沖氣也萬物負隂而抱陽沖氣為和即申説三生萬物也此言生一生二與儒者不同此章惟李息齋注差明白可味天下之至柔馳騁天下之至堅無有入於無間吾是以知無為之有益不言之教無為之益天下希及之惟天下之至柔為能馳騁天下之至堅而役使之惟無有者為能入無間之內而無不達吾是以知無為之為有益也無為之為所謂至柔也無有也何所不馳何所不入乎然不言之教無為之益天下希及之矣蓋歎其鮮能也名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久人之徇名者知有名而不知有身亦思名與身孰親乎人之貪貨者知有貨而不知有身亦思身與貨孰多乎徇名貪貨者皆知好得而病亡亦思得與亡孰病乎是故有所甚愛則求之者必力而有大費所藏者厚則攻之者必衆而至厚亡至此而始悟名之為身纍也貨之為身賊也得之為病甚於亡也若夫君子能知足則不辱能知止則不殆斯乃可以長久耳大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辨若訥躁勝寒靜勝熱清靜為天下正道德之大成者不自知其成也自視常若缺故其用不敝才能之大盈者不自以為盈也自視常若沖故其用不窮行之大直者循理而動不與物競故若屈知之大巧者行所無事不為雕琢故若拙言之大辨者理有固然不以口爭故若訥此清靜之德也今夫寒熱之氣有形者之所不免而躁者可以勝寒靜者可以勝熱內之勝外如此豈有體清靜之德而不為天下所取正者乎天下有道卻走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣天下有道無所事爭卻走馬以糞田天下無道則日尋於爭而戎馬生於郊何以故罪莫大於可欲有可欲而以示人盜之招也禍莫大於不知足不知足而求益亂之所由生也咎莫大於欲得人之有欲得人之有大惡之所歸也匹夫有此患必及之侯王而為此戎馬所以生於郊乎故人能知其分之已足而自足焉則無不足矣無不足則不爭矣不出戶知天下不窺牖見天道其出彌逺其知彌少是以聖人不行而知不見而名不為而成不出户可以知天下天下之為天下無待於出户而後知也不窺牖可以見天道天道之為天道固無待於窺牖而後見也若不知天下天道之所以然而求之於外出户而後知所知幾何窺牖而後見所見幾何即窮其所知所見以求之其出彌逺其知彌少矣是以聖人之知天下不自天下索知也聖人之見天道不自天道起見也知不在外見不在外故不待行以求之而後知也不待目見而後名也不行而已知不見而已名且不必有所作為而已成矣聖人體道之功用如此其至也為學日益為道日損損之又損以至於無為無為而無不為矣故取天下常以無事及其有事不足以取天下為學者以求知故欲其日益為道者在返本故欲其日損損之者無欲不去亦無理不忘損之又損以至於一無所為而後與道合體焉為道而至於無為則可以物付物泛應無方而無不為矣故古之聖人取天下而化之正之者常以無事及其有事則為者將敗之執者將失之何足以取天下乎無事即無為也取開元疏云猶攝化也聖人無常心以百姓心為心善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之聖人無常心惟以百姓之心為心而已百姓之心皆欲上之善之也皆欲上之信之也聖人於百姓之善者吾善遇之即其不善者吾亦善遇之斯其德全乎善矣百姓之信者吾信待之即其不信者吾亦信待之斯其德全乎信矣聖人之在天下惵惵然恐天下之不相忘於善相忘於信故為天下渾同其心一以視之而無所異焉百姓方注其耳目互相伺察各有是非聖人皆孩之孩之者視若嬰兒見其是者亦不喜見其非者亦不怒也聖人之無常心以百姓心為心者如此惵惵恐懼也出生入死生之徒十有三死之徒十有三人之生動之死地者亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地萬物之變莫大乎生死茍出乎生即入乎死約計當世之人宜得生而為生之徒者十有其三宜得死而為死之徒者十有其三自以為之生實則動而之死地者亦十有其三夫方以為之生乃動之死地者何以故以其生生之厚也其奉生者愈厚則其趨死者愈迫故曰之生而適之死也要之皆非攝生之善者蓋聞善攝生者陸行不遇虎兕入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地也所謂死地者身是也不有其身方以生為寄而不之愛不愛其生孰能死之此所謂善攝生者也諸解多以出謂自無而見於有入謂自有而歸於無無死地謂本性常存道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有為而不恃長而不宰是謂玄德立於無物之先者道也此萬物之所始故凡物皆道生之道運而為德隂陽之氣是也萬有之所資也故凡物皆德畜之氣聚而有物而後有形可見故物其形之者也物既形矣此物之形與衆物之形相交相取而為勢而後物之體用以備故勢其成之者也物之形形此道之所生德之所畜而已勢之成成此道之所生德之所畜而已是以萬物莫不尊道而貴德道之尊德之貴豈有待而然哉夫固莫之爵而常自然者也故道之於物生之畜之不已也而又長之育之亭之毒之養之覆之其為功於物如此然皆自然而然生之而不有也為之而不恃也長之而不宰也此豈可得而名可得而測者乎天下有始以為天下母既得其母以知其子既知其子復守其母沒身不殆塞其兌閉其門終身不勤開其兌濟其事終身不救見小曰明守柔曰強用其光復歸其明無遺身殃是謂襲常天下有始以為天下母此人所當體而得之者也既得其母以知其子將無所不察無所不濟然不可徇末而忘本也既知其子必復守其母斯可以沒身不殆矣守母之道如何塞其兌閉其門終身不勞而功自成不然開其兌以求濟其事將終身危殆而莫之救人可不知返而守母乎視之而不可見者小也能見此不可見是曰明守之而無可守者柔也能守此無可守是曰強用其外見之光復斂其光而歸本然之明勿外馳不返以遺身殃是謂能服習常道而與之合一者也此皆言體道之事曰始曰母皆指道言子萬物也知小守柔即守母也小柔即上篇希夷微之意形道妙之辭襲即中庸下襲水土之襲也使我介然有知行於大道惟施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚服文采帶利劍厭飲食資貨有餘是謂盜竽非道哉使我介然有知行於大道亦無不可知不可行也惟夸張則必至失道是可畏耳大道甚夷本自易行而民每好徑遂至背馳好徑者何如視其朝甚除刑政繁矣視其田甚蕪視其倉甚本業廢矣乃服文采帶利刃厭飲食資貨有餘寵賂章矣大姦作小盜隨是謂盜之先唱如竽之唱衆聲也真非道也哉善建者不拔善抱者不脫子孫祭祀不輟修之於身其德乃真修之於家其德乃餘修之於鄉其德乃長修之於邦其德乃豐修之於天下其德乃普故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此善建者其所建不可拔善抱者其所抱不可脫傳之無窮至其子孫猶祭祀不輟也所謂善建善抱者善修其德而已修德者修之於身而身正其德乃真修之於家而家齊其德乃餘修之於鄉而鄉服其化其德乃長修之於邦而邦順其治其德乃豐修之於天下而天下各得其所其德乃普此其所以不拔不脫也何以知其德之修與否也以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下而已吾何以知天下之然哉以此觀身數語未詳含德之厚比於赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而脧作精之至也終日號而不嗄和之至也知和曰常知常曰明益生曰祥心使氣曰強物壯則老是謂不道不道早已含德之厚者至比於赤子為赤子者毒蟲不螫猛獸不據攫鳥不搏皆厚德之應也骨弱筋柔而握固不知牝牡之合而脧作其氣精純之至也終日號而不嗄心不動而氣和之至也知此至和之理者是之謂知常道知此常道者是之謂至明知其和知其常而守之不失則含德之厚可比赤子矣不然不知生之不可益而欲益之是葘診欲至之祥氣好勝而心復使之是謂不能弱而失之強物至於壯則必老恃壯者是謂不道不道則早已與含德者不大殊哉知者不言言者不知塞其兌閉其門挫其鋭解其紛和其光同其塵是謂玄同不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故為天下貴知者不言言者不知知道者塞內出之兌閉外入之門挫已之鋭解物之紛和已之光同世之塵是之謂忘物我混內外玄同於道者也亦安所恃言哉未能玄同者同乎此則異乎彼同乎始未必不異乎卒當其同也則親之利之貴之及其異也則疏之害之賤之玄同之人無所為同也安有所謂異故不可得而親亦不可得而疏不可得而利亦不可得而害不可得而貴亦不可得而賤故為天下之至貴以正治國以竒用兵以無事取天下吾何以知天下之然哉天下多忌諱而民彌貧民多利器國家滋昏人多技巧竒物滋起法令滋章盜賊多有故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴為君者以正道治國以竒變用兵以無事取天下吾何以知天下之可以無事取哉嘗觀天下多忌諱則失業者衆而民彌貧民多權謀則國家眩於是而滋昏人不務本業而多技巧則珍竒無益之物滋起多為法令以制人則盜賊因之而愈多有此皆為上者多事之所致也知多事之足以病天下則知無事之足以取天下矣故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴蓋言無事之足以取天下也為化並讀如訛或化讀如歸蘇子由云利器權謀也其政悶悶其民醇醇其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復為竒善復為祅人之迷也其日固久矣是以聖人方而不割廉而不劌直而不肆光而不耀為君者其政悶悶而廣大歟則其民醇醇而知厚矣其政察察而煩苛歟則民缺缺而疏薄矣悶悶者若無得於民也而醇醇者應之察察者若大得於民也而缺缺者應之人見為禍而已為福之所倚人見為福而已為禍之所伏孰有知其究竟者哉方人之為察察之政其獨未嘗以正耶久之而正者復為竒矣善者復為祅矣察察之害如此人之狃目前之小福而忽逺禍者其日固已久矣是以聖人方而不割廉而不劌直而不肆光而不耀去察察而取悶悶也正而不至為邪善而不至為祅此道得也竒邪也祅怪變也劌傷也割也治人事天莫如嗇夫惟嗇是謂早服早服謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久是謂深根固柢長生久視之道柢一作蒂治人者不欲煩事天者不欲費二者皆如嗇嗇者斂退靜之意夫惟嗇是不待禍患之形而早自服習於道也早自服習於道是重積德於已也重積德於已則於天下之事將無所不勝於事無所不勝則其德之量又莫知其所極德之量莫知其所極則可以有國矣其有國也乃有其撫育一國之本是有國之母也斯可以長久治安而無患矣是道也以之治生則深根固柢長生久視之道也故治人事天皆莫如嗇韓非子曰衆人之用神也躁躁則多費多費之謂侈聖人之用神也靜靜則少費少費之謂嗇又曰知治人者其思慮靜知事天者其孔竅思慮靜故德不去孔竅則和氣日入語皆可味治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷人夫兩不相傷故德交歸焉焦氏云烹不當加火治大國者不可以煩若烹小鮮之不可以撓治之以道而已人主誠能以道蒞天下則其鬼寂然安於冥漠而不神非其鬼不神也其鬼雖神而不為厲以傷人若不神耳又非其神之自不傷人也聖人之治亦不傷人以和召和故神不傷人耳聖人不傷人聖人之德為之也兩不相傷而德交歸於聖人焉亦字當善讀乃追原語兩不相傷亦謂聖人與神俱不傷人非謂人神不相傷大國者下流天下之交天下之牝牝常以靜勝牡以靜為下故大國以下小國則取小國小國而下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲故大者宜為下大國者小國之下流天下所交會之國即天下之牝也牝之為物常以靜勝牡以靜為下知牝之道則知大國之道矣故以大國而下小國則取小國之心而為其所歸以小國而下大國則取大國之心而為其所畜或下以取人或下而取於人為牝之益大矣嘗觀大國之情不過欲兼畜人小國之情不過欲入事人今大國亦能下而取小國小國亦能下而取大國兩者各得其所欲矣故大者不可恃其大而宜為下也大者宜下况小者乎道者萬物之奧善人之寶不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何不曰求以得有罪以免耶故為天下貴道者萬物所藏以為安之奧善人治身治世之寶而不善人之所倚以自保也何以見其為不善人之所保人即不善茍有一言之美亦可以市於人一行之尊亦可以加人之上人之不善知悔而求道何至遽為人棄之有道為不善人之所保如此故天子所由立三公所由置亦以道在而人歸之耳雖有拱璧以先駟馬誠不如坐進此道之可貴也古之所以貴此道者何也不曰求以得有罪以免耶求以得故為善人之寶有罪以免故為不善人之所保而為天下貴也為無為事無事味無味大小多少報怨以德圖難於其易為大於其細天下難事必作於易天下大事必作於細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難矣聖人所為者無為所事者無事所味者無味大視其小多視其少報怨以德圖難於其方易為大於其方細蓋以天下難事必起於易天下大事必起於細也是以聖人於天下之事終不待其大而後為之故能成其大若夫衆人之輕諾者後必難復而寡信於事多見為易者後必多至於難是以聖人之於事猶難之故終皆可成而無難矣焦氏云為營為也王純甫云事所為之條件也味所謂之理趣也作起也其安易持其未兆易謀其脆易判其微易散為之於未有治之於未亂合抱之木生於毫末九層之臺起於纍土千里之行始於足下為者敗之執者失之是以聖人無為故無敗無執故無失民之從事常於幾成而敗之慎終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢為焦氏從韓非本作恃今斷從諸本天下之事方其安易持方其未兆易謀方其脆易破方其微易散故為之者亦於其未有而為之治之者亦於其未亂而治之乃為善於為善於治者耳試觀合抱之木生於毫末九層之臺起於纍土千里之行始於足下何者不始於小而終於大乎可不為於未有治於未亂乎為之治之將如何亦因物之自然而已天下事有所作為者常敗之有所固執者常失之聖人無為故無敗無執故無失所以能為於未有治於未亂也凡事又不特始者宜愼也民之從事常於幾成而敗若能慎終如始則無敗事矣是以聖人以不欲為欲故不貴難得之貨以不學為學故復衆人之所過凡以輔萬物之自然而不敢為也是以聖人以下數句與上文不相屬豈錯簡歟古之善為道者非以明民將以愚之民之難治以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式能知楷式是謂玄德玄德深矣逺矣與物反矣乃至於大順古之善治道術者非以明民而使之智將以愚之使之去巧詐返淳朴也民之難治以其智之多耳我若以智治國則民亦將以智應之機詐愈深大亂將作是國之賊也惟安於無為而不以智治之則民亦將不識不知以順吾治乃國之福也知此之為福彼之為賊則得治國之楷式是謂玄德玄德之為德深矣逺矣且物方競智而已獨賤之與物情反雖與物反必如此乃上下和平至於大順江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人必以言下之欲先人必以身後之是以聖人處上而民不苦其重處前而民不忮害之不惟不重不害天下且樂推而不厭以其善下而不爭故天下莫能與之爭也老氏疵處在此子由云聖人欲上人非欲先人也蓋人下之後之其道不得不上且先耳增飾之詞非其本旨諸文士解老佛書多類此天下皆謂我道大似不肖夫惟大故似不肖若肖久矣其細也夫我有三寶寶而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能成器長今其慈且勇其儉且廣其後且先死矣夫慈以戰則勝以守則固天將救之以慈衛之天下皆謂我之道則大矣其人則似一無所能而不肖者夫惟大故似不肖若有所能而肖久矣其細也夫我有三寶常寶而持之三寶者一曰慈二曰儉三曰不敢為天下先此天下所謂不肖者也夫慈則為人致福除禍行之不疑故能勇儉則積貯有餘致用必裕故能廣不敢為天下先則與物無忮人所樂推故能為材用之長三寶之為益於天下者如此今使捨其慈而徒為勇捨其儉而好為廣捨其後而樂居先是人之所惡也有死道矣較之知所寶者何如乎試以慈之效言之夫為上者盡慈之道則百姓親附各出死力以衛其上以戰則勝以守則固是天之將救是人也故開其心使之以慈得衆而衛之也人知是人之以慈衛人也不知實天之欲救是人而以慈衛之也則世之殘民以逞者其天之所絶乎善為士者不武善戰者不怒善勝敵者不爭善用人者為之下是謂不爭之德是謂用人之力是謂配天古之極善為士者不尚勇武善戰者恬淡而不怒善勝敵者不與之爭善用人者身為之下有此善者是謂不爭之德是謂能用人之力是謂能配合乎天之道此自古之極則也用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂扔無敵執無兵禍莫大於輕敵輕敵幾喪吾寶故抗兵相加哀者勝矣用兵者有言吾不敢為造兵端之主但後起應敵而為客吾不敢進寸而爭人之有寧退尺而守巳之分是用兵而存不用之心若無行陳之可行無臂之可攘無敵之可扔無兵之可執也存心如此安有用兵之咎乎夫國家之禍莫大於輕敵輕敵幾於自喪其寶故兩國抗兵相加惟哀人之死而不樂殺者斯勝矣吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫惟無知是以不我知也知我者希則我貴矣是以聖人被褐懷玉吾言甚易知甚易行天下莫能知莫能行者何也言有其宗事有其君知其宗與君而後謂之知而後可見之行夫惟不知言之宗事之君是以雖聞吾言而終不我知也知我者希此在我者之所以可貴也是以聖人被褐懷玉豈人之所及知乎知不知上不知知病夫惟病病是以不病聖人之不病也以其病病是以不病知而不自以為知者上也不知而自以為知者病也夫惟病其病者是以不陷於病聖人所以無強知之病者以其深病此病是以不至於病也民不畏威則大威至矣無狹其所居無厭其所生夫惟不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此民不畏刑威則必犯法而大威至矣民之所以不畏威者由於狹其所居而志於大厭其所生而志在多故陷死亡而不恤耳人各有分慎無狹其所居之位也慎無厭其所生之資也夫民心何常在上之所導耳惟為上者先不厭其所生是以民亦不厭其所生使上好侈大樂富厚民志何由定乎是以聖人自知而已不自見以誇人自愛而已不自貴以上人故去彼厭常競新之習而取此清靜也勇於敢則殺勇於不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之天之道不爭而善勝不言而善應不招而自來繟然而善謀天網恢恢疏而不失人有用剛使氣而勇於敢者則必致殺人有用柔能退而勇於不敢者則可全活此兩者或利或害人皆知其不同也勇於敢為天之所惡孰知其致殺之故在此乎是以勇敢之事雖在聖人猶難之誠知其為天之所惡耳天之道未嘗與人爭也而卒之無所不勝未嘗言也而善與人事相應不待呼召也而自來格於日用之間繟然舒緩若與人忘也而善為萬物謀其成毁降祥降殃天之法網恢恢然大矣雖若疏廓而未嘗遺失天道之可畏如此一犯其所惡何以自免乎民常不畏死奈何以死懼之若使人常畏死而為竒者吾得執而殺之孰敢常有司殺者殺夫代司殺者殺是代大匠斫夫代大匠斫者希有不傷手矣一民下無常字人常作民常民之情本不畏死為民上者奈何以死懼之若使人常畏死為竒者吾得執而殺之孰敢復為竒者乎惟殺之而不止因知民之未嘗畏死也則人恃刑以為治者亦可以返矣且民之有罪常有司殺者殺之若任一人之喜怒而殺人是代司殺者殺如人代大匠斫也代大匠斫希有不傷手者矣司殺者法也聖人立法本乎天討不可以私意輕重其間為廢法任情者警也民之飢以其上食稅之多也是以飢民之難治以其上之有為也是以難治民之輕死以其求生之厚也是以輕死夫惟無以生為者是賢於貴生民之飢以其上食稅之多也食稅多而民力竭是以飢民之難治以其上之有為也有為而民智繁是以難治民之輕死以其求生之厚也求生厚而貪無厭是以輕死夫惟無以生為者在上則不多取多事以病其下在下則不敢扞網為姦以纍其上是賢於貴其生矣人之生也柔弱其死也堅強草木之生也柔脆其死也枯稿故堅強者死之徒柔弱者生之徒是以兵強則不勝木強則共強大處下柔弱處上人之生也柔弱及其死也則堅強草木之生也柔脆及其死也則枯稿故堅強者死之徒也柔弱者生之徒也是以兵強者則反而不勝木強者則人共伐之凡物之強大者常處下柔弱者常處上人可以知所去取矣天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘而輔不足人之道則不然損不足而奉有餘孰能以有餘奉天下唯有道者是以聖人為而不恃成功而不居其不欲見賢耶天之道其猶張弓乎張弓者高者抑之使下下者舉之使高天之道有餘者損之不足者補之政相類也天之道損有餘而輔不足人之道則不然損不足而奉有餘孰能以有餘奉天下之不足者乎惟有道者能之耳是以聖人為之而不恃其為成功而不居其功其殆不欲自見其賢耶庶幾能損有餘輔不足者耶焦氏云凡弛弓俯其體則弣在上弰向下張之而仰其體則弣向下弰在上是抑弣之高者使之向下舉弰之下者使之在上天之損有餘如抑其弣而使之向下其輔不足如舉其弰而使之高天下莫柔弱於水而攻堅強者莫之能先以其無以易之也故柔之勝剛弱之勝強天下莫不知莫能行是以聖人云受國之垢是謂社稷主受國之不祥是謂天下王正言若反天下莫柔弱於水而攻堅強者莫之能先以性常然未嘗變易也弱之勝強柔之勝剛天下亦莫不知也但莫能行耳故聖人云受國之垢是謂社稷主受國之不祥是謂天下王斯言也是合道之正言也世俗視之若以為反正之言以其方以垢為辱以不祥為殃也豈知柔弱之勝剛強乎和大怨必有餘怨安可以為善是以聖人執左契而不責於人故有德司契無德司徹天道無親常與善人人有大怨而我為之和必有餘怨之不勝和者矣有心為善所及有限安可以為善乎是以聖人無心待物如執左契待人之來符於己而不往責於人故有德者無心計較是謂司契無德者恐其不均而較量多寡是謂司徹和大怨者亦司徹者耳是以不得為善也天道亦然天道於人無所私愛其所與者常在善人亦善人之自取之也豈常求善人而與之哉禮記獻粟者執右契疏云契者兩書一札同而别之右者先書為尊此言獻粟必先以右契獻人之意因知左契在主財物者之所右契取財物者所執則執左契者待人之來取合則與之不往責人也司徹即主徹法均分多寡之人言有心計較也小國寡民使有什伯之器而不用使民重死而不逺徙雖有舟車無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望雞犬之音相聞民至老死不相往來吾願今之為諸侯者各安其小國寡民而不求多使為之民者各安其分雖有什伯乎人之材器而不求用使民重惜其死而不逺徙以求利雖有舟車無所乘之雖有甲兵無所陳之使民忘其詐巧復結繩而用之各自甘其食美其服安其居樂其俗內足而外無所慕即鄰國相忘雞犬之音相聞地至近矣民亦至老不相往來至近且然况逺者乎往來且無况爭奪乎無為之治蓋如此信言不美美言不信善言不辨辨言不善知者不博博者不知聖人不積既以為人已愈有既以與人已愈多天之道利而不害聖人之道為而不爭言之信者不美言之美者不信言之善者不辨言之辨者不善知道者不博務博者不智試舉聖人之道而約言之聖人之為聖人無所積以自私故常為人既己為人已愈有故常與人既已與人已愈大天之道利而不害聖人之道為而不爭聖人之道一天道而已矣老子説略卷下
