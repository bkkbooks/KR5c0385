body:
  text: 老子説略道家𩔖提要臣等謹案老子説略二卷國朝張爾岐撰爾岐有儀禮鄭註句讀已著録道徳經解者甚多往往繳繞穿鑿自生障礙爾岐是編獨屏除一切略為疏通大意其自序謂流覽本文讀有未通輙以己意占度稍加一二言於句讀隙間覺大義犂然視諸註勿計不能讀亦已不欲讀云云又有自跋稱人問朱子道可道如可解應之曰道而可道則非常道名而可名則非常名朱子生平未嘗解老使其解老此即其解老之法亦即可謂解一切諸書之法要在不執解求解反之是書以解是書而已云云盖其大㫖在於涵泳本文自得理趣故不及縱横摧譎之談亦不涉金丹黄白之術明白簡當頗可以備叅覽焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀老子説略序老子明道徳盖將治身以及天下與外常倫遺世事者異矣先儒審辨源流毎有論駁至清静不争之旨則莫或異議彼好之者欲以先六經固不可若槩以浮屠神仙之屬等斥之不已過乎註者紛紛務矜新異各以其胷中所見之老子為老子非必西周柱下之老子而老子殆將𨼆矣譬之水瀹茗則苦漬蔗則甘和醢則酸投鹽則鹹雜橘橙薑桂則又橘橙薑桂謂水味本爾不誣水乎今夏偶及是書目力衰甚苦不能讀細註流覽本文而已讀有未通輒以己意占度稍加一二言於句讀隙間覺大義犁然迴視諸註勿計不能讀亦已不欲讀矣因自笑曰貧者啜水乃厭酒醴之為煩此豈可與言天下之備味哉雖然屬饜之餘激喉滌齒亦未必不有取於斯也因録而存之曰説畧康熈八年己酉夏五月望後一日濟陽張爾岐題
