body:
  text: 老子說畧卷上濟陽張爾岐撰上篇道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之𤣥𤣥之又𤣥衆妙之門徼音教道之可得而道者非常道也常道不可得而道也常道不可得而道又可得而名乎名之可得而名者亦非常道之名也夫此不可得而名者乃天地之所自始既有天地乃有可名此有可名者實萬物所從生之母也道之自無而有如此故聖人之體道也常體其無將以觀其無之妙不離乎有將以觀其有之徼有無兩者相爲體用本非有二也特異名耳無者固𤣥也有者亦非跡同謂之𤣥也𤣥不足以盡之殆𤣥而又加𤣥焉此𤣥𤣥之中萬理備具豈非衆妙之門乎可道之道與中庸自道之道同人之所可循以為行者也或於常無欲常有欲絶句欲猶意也情也蓋言無意之時觀道之妙有意之時觀道之徼愚謂方有欲則非無欲方無欲則非有欲何以云常無欲常有欲故斷從有無字絶句徼如邊徼之徼物之盡處也朱子云如邊界相似說那應接處蓋事到盡處必有相承接底如下章美惡善不善之𩔖人於此處留心方可處事蘇子由曰凡逺而無所至極者其色必𤣥故老子常以𤣥寄極也朱子曰𤣥只是深逺而至於黒窣窣地處那便是衆妙所在此篇全書之綱領後凡言道體者皆觀其妙也常道也無名者也凡言應事者皆觀其徼也非常道也有名者也天下皆知美之為美斯惡已皆知善之爲善斯不善已故有無相生難易相成長短相形髙下相傾聲音相和前後相隨是以聖人處無爲之事行不言之教萬物作焉而不辭生而不有爲而不恃成功而不居夫惟不居是以不去天下皆知美之為美則將相與市之而美者非美矣天下皆知善之爲善則將爭自託之而善者非善矣本美也而反爲惡本善也而反爲不善若知其美而不美善而不善之故而善處之又將美者眞美善者眞善矣美與惡善與不善相爲循環之理如此故有與無之相生難與易之相成長與短之相形髙與下之相傾聲與音之相和前與後之相隨皆若是而已矣是以聖人知其然處無爲之事行不言之教萬物作於其前美惡雜陳而未嘗有所辭卽生養萬物而不自以爲有經理萬事而不自以爲可恃至於功旣成矣而猶不自居也夫惟其不自居是以功卒歸之而不去此美不知其美善不知其善美與善之所由全也此章前叚卽所謂觀其徼也美之盡處有惡惡之盡處又有美有無之𩔖皆然是以以下則觀徼而得妙不尚賢使民不爭不貴難得之貨使民不爲盗不見可欲使心不亂是以聖人之治虗其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治見音現上尚賢則民自表異而爭於名不尚賢則不爭矣上貴難得之貨則民競於利而至爲盗不貴難得之貨則不爲盗矣上見其可欲以示人則人皆欲得之而心亂不見可欲則民心不亂矣凡民之情如此是以聖人之治於華艷之事則務靖之於樸質之業則務充之是虗其心實其腹也於爭競之端則務塞之於自立之實則務崇之是弱其志强其骨也常使民無知而不起分别之見常使民無欲而不生貪得之心且使夫知巧之人不敢以私智小道亂吾之治焉其所爲者唯順民之性而無所爲則天下無不治矣心腹志骨四字皆借喻道沖而用之或不盈淵兮似萬物之宗挫其銳解其紛和其光同其塵湛兮似或存吾不知其誰之子象帝之先道沖然至無耳而用以適衆有無所不遍或未有能盈其量者淵乎其似萬物之宗主也體道者惟當挫已之銳而不爭解物之紛而無擾和已之光而不耀同物之塵而不絶湛然無存而似或存焉體道如此道終不可得而名也吾不知誰在其先而此爲之子也彷彿尚在帝之先耳邵弁云上二其字以己言下二其字以人言言或言似言象皆不敢質言之也此常無觀妙之事也天地不仁以萬物為芻狗聖人不仁以百姓為芻狗天地之間其猶槖籥乎而不屈動而愈出多言數窮不如守中天地未嘗有私恩於物但聽萬物之自生自死其視萬物若人所用以祭之芻狗然飾之而進非愛之既事而棄非惡之皆適然而已聖人之於百姓亦未嘗用私恩也但因民性之自然而無以害之生殺予奪聽其自取而我無心焉夫天地之間其猶治者之槖籥乎槖籥之爲器虗其中而不屈一動而氣愈出天地之生萬物亦若是而已矣何所庸其私恩之有知天地則知聖人聖人之所以治民者亦自有其虗而不屈者在所謂中也守之可耳多言致窮何爲乎焦氏云屈鬱也抑而不申之意末二句未免强解似自爲一義王純甫以爲老子慮後世誤認芻狗之言而發此歎亦似有味谷神不死是謂𤣥牝𤣥牝之門是謂天地根綿綿若存用之不勤谷神不與物俱死是謂𤣥牝𤣥牝之門乃天地之所從而生是謂天地之根學道者體乎此而已矣綿綿然若或存之非存而存也用之以應物而不勤無用之用也焦氏曰谷喻也以其虗而能受受而不有微妙莫測故曰谷神牝生萬物猶前章所謂母也謂之𤣥牝亦幽深不測之意薛君采曰牝讀如匕以叶上句𤣥牝之門特衍其辭與下句相叶蘇氏曰謂之谷神言其德也謂之𤣥牝言其功也牝生萬物而謂之𤣥焉言其生之而不見其所以生也此申說首章之㫖谷神不死卽所謂常道也𤣥牝之門是謂天地根即無名天地之始也綿綿若存觀妙之事用之不勤觀徼之事天長地久天地所以能長且久者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私天長地久天地所以能長且久者以其生物而不自私其生故能長生使天地而自私其生則天地亦一物矣何以能長且久哉是以聖人處柔處下本以後其身也而身以先寡欲無求本以外其身也而身以存其後身外身非以其心之無私耶心無私故能成其私而身以先身以存焉亦理勢之固然者耳上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信政善治事善能動善時夫唯不爭故無尤人之上善有似乎水水之爲性善於利萬物而不爭人皆好上已獨就下而處衆人之所惡故近於道人之上善者居則善地無處而不安一水之流行坎止也心則善淵靜深而莫測一水之空洞靜黙也與則善仁而利澤及物一水之滋益羣生也言則善信而不棄一水之行險不失也政則善治而得理水之滌穢通美平準髙下也事則善能而多方水之潰堅入微無往不達也動則善時而能變水之避髙就下流動不滯也兼此衆善而又能不爭夫唯不爭故入世而無尤此上善之所以若水也持而盈之不如其已揣而銳之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道人有所固持而盈之不如不盈之爲安也有所揣量而銳之不知銳之不可恃也金玉滿堂莫之能守盈何爲乎富貴而驕自遺其咎銳何爲乎亦法天之道而已功成名遂身退天之道也有而不有無所謂盈矣循理而動無所謂銳矣諸本多解作持其盈揣其鋭載營魄抱一能無離乎專氣致柔能嬰兒乎滌除𤣥覽能無疵乎愛民治國能無爲乎天門開闔能無雌乎明白四達能無知乎生之畜之生而不有爲而不恃長而不宰是謂𤣥德心役於物則營與魄離人之載營於魄而抱一者能常相守而不離乎心使氣則氣亂人之專守其氣以致柔能如嬰兒之純乎私累不盡則神有所蔽人之滌除塵垢𤣥通曠覽者能無疵乎身既治而治人愛民治國能清靜坐理而無爲乎天門開闔以應事變能爲雌而不爲雄乎旣於事理明白四達能晦黙若無知乎能如此則於天下之民生之畜之生之而不自以為有為之而不恃其勞長之而不任己意以宰制之是爲深逺難名之德朱子曰魂陽動而魄隂靜魂火二而魄水一故曰載營魄抱一能無離乎言以魂加魄以動守靜以火迫水以二守一而不相離如人登車而載於其上則魂安靜而魄精明火不燥而水不溢固長生久視之要訣也𤣥覽卽觀妙觀徼之觀天門指心開闔心之運動變化也三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿戸牖以爲室當其無有室之用故有之以爲利無之以爲用三十輻共一轂當無轂之處乃有車之用埏埴以爲器當無器之處乃有器之用鑿戸牖以爲室當無室之處乃有室之用有資於無如此故天下之理皆有之以爲利無之以爲用非有則無利而用之質亡矣非無則無用而利之機滯矣無非有不可也有非無亦不可也五色令人目盲五音令人耳聾五味令人口爽馳騁畋獵令人心發狂難得之貨令人行妨是以聖人爲腹不爲目故去彼取此目以視色五色眩目而目爲之盲耳以察音五音沸耳而耳為之聾口以嘗味五味飫口而口爲之爽田獵以自娛馳騁不已而心爲之發狂貨以利用好其難得而行爲之妨豈非貪爲之患哉逐乎外而無厭者目也止於内而易足者腹也是以聖人爲腹之易足不爲目之無厭故去彼外逐而取此内止也寵辱若驚貴大患若身何謂寵辱若驚寵爲下得也若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者爲吾有身及吾無身吾有何患故貴以身爲天下者可以寄天下愛以身爲天下者可以託天下古之達人寵辱皆若驚視寵猶辱也重大患如身同身於患也何謂寵辱若驚人莫不以寵爲上而辱爲下若知辱生於寵寵爲辱先則寵固爲下矣故得之若驚訝辱之將至也失之亦若驚幸辱之可免也何謂重大患若身吾所以有大患者爲吾之自有其身耳自有其身則愛身之情過篤而人世得失之事皆足爲難矣吾能後其身外其身是不有其身也不有其身則死生榮辱可以一致復有何患乎進而推之人之不有其身者必不以得天下爲榮而貴以身爲天下矣斯人也真可寄以天下者也人之不有其身者必能不自生而生人而愛以身爲天下矣斯人也真可託以天下者也貴重也難也視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰故混而爲一其上不皦其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀視之而不見因名曰夷聽之而不聞因名曰希摶之而不得因名曰㣲此三名皆强名也實則不可致詰故混而爲一凡物之有形者皆有明昧此則上不皦而下不昧無形之可求也繩繩兮往過來續於日用之間若有物可名而實不可名復歸於無物而已是謂無狀之狀無物之象是謂惚而可執以爲有恍而不可執以爲無迎而求之莫知其所自來也隨而究之莫知其所自終也自古有之謂之曰道人有執古之道以御今日所有之事物者身在今日而能知古初無物之始矣是謂道之統緒約畧也通章皆極贊道體之妙古之善爲士者微妙𤣥通深不可識夫唯不可識故强爲之容豫若冬渉川猶若畏四鄰儼若客渙若冰將釋敦兮其若樸曠兮其若谷混兮其若濁孰能濁以靜之徐清孰能安以久動之徐生保此道者不欲盈夫唯不盈故能敝不新成古之善為士者微矣妙矣𤣥矣通矣其深不可得而識也夫唯不可識故但强爲之容豫兮若渉川之難之也猶兮若畏四鄰之慎之也儼若客之無惰也渙若冰釋之無所凝滯也敦兮其若樸之厚重也曠兮其若谷之虗受也渾兮其若濁之晦黙也盛德之容蓋如此其微妙𤣥通者終不可得而識也古之士何以致此哉亦惟濁以靜之徐清安以動之徐生而已今之人皆昭昭以爲清耳孰能濁以靜之而徐自清皆爭先以爲生耳孰能安以久而不妄動動之而因應徐生者乎大抵保此道者不欲自盈盈則心不而道不可保矣夫唯不盈則能安其敝能不求新成則其所以靜而徐清動而徐生微妙𤣥通之域可企而至也能敝能不新成卽濁也安以久也極形盛德之妙而示人入德之方致虗極守靜篤萬物並作吾以觀其復夫物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃久没身不殆致至於極守靜至於篤萬物並作於前吾不與之作而以觀其復萬物之作芸芸然矣我觀復則不見其芸芸而與之各歸其根夫物之芸芸者歸其根則萬物無足動我者是之謂靜是之謂復命命者我生之本然也復其本然則無動也亦無靜也謂之常而已知常者非微妙𤣥通之士不足以幾之故曰明不知此常則未免妄作而致凶人知常則善惡兩忘何所不容能容則徧覆無私何有不公公則可以爲斯民之主而王王又不足以盡之而合乎始萬物之天先天地之道人與道合體斯可以久而没身不殆矣極言虚靜之效其入手在觀復觀復即首章觀徼也太上不知有之其次親之譽之其次畏之其次侮之信不足有不信猶兮其貴言功成事遂百姓皆謂我自然不知有之諸本並作下知有之太上盛治之君下但知有之而已其次則民親之譽之又其次則畏之又其次則侮之其遞降而至致侮者何故惟上之信有不足故民有不信而至於侮也民既不信雖多言何益乎若太上之君則不然猶兮貴重其言而不輕出使民隂受其賜及功成事遂百姓皆以爲我自如此不知誰之所爲也所以下但知有之也大道廢有仁義智慧出有大僞六親不和有孝慈國家昏亂有忠臣大道之行也民不知有仁義大道廢而後仁義見矣民本相忘於樸智慧者出而自矜其明則民各以智相尚而大僞從此起矣六親方和孝慈不著人盡孝且慈也不和而後有孝慈矣國家方治忠臣不見臣盡忠也國家昏亂而後有忠臣矣絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盗賊無有此三者以爲文不足故令有所屬見素抱樸少私寡欲以聖智相尚則民各奮其智能而苦於多事絶聖棄智民利百倍矣以仁義爲美則人騖於名而孝慈之實衰絶仁棄義民復孝慈矣以巧相御以利相誇則民多貪詐而至於爲盗絶巧棄利盗賊無有矣此三者聖人以爲皆文也皆不足者也故令絶之棄之而他有所屬惟見其質抱其樸少所私寡所欲以庶幾於無爲之治焉此章與前章緊相應絶學無憂唯之與阿相去幾何善之與惡相去何若人之所畏不可不畏荒兮其未央哉衆人熙熙如享太牢如春登臺我獨怕兮其未兆如嬰兒之未孩乘乘兮若無所歸衆人皆有餘而我獨若遺我愚人之心也哉沌沌兮俗人昭昭我獨若昏俗人察察我獨悶悶忽兮若晦寂兮似無所止衆人皆有以我獨頑似鄙我獨異於人而貴食母焦氏云怕古泊字靜也人絶去世俗名象之學則無分别計較之憂如唯阿善惡世學之所務别也自我觀之唯之與阿相去幾何乎善之與惡相去何若乎亦固任之已耳可無用學可無用憂也若夫人之所畏我亦不可不畏不敢有所忽遺也然循理謹度而外無容心焉此心之廣大荒哉其未之有涯際矣人之所樂我未嘗溺以為樂衆人方熙熙然如享太牢如春登臺我獨怕兮其無情欲之兆如嬰兒之未孩矣畏與樂皆不足累但覺其心乘乘兮若無所歸不係於私也衆人皆有餘而我獨若遺不滯於有也我其愚人之心也哉沌沌兮俗人昭昭其有知也而我獨若昏俗人察察其務别也而我獨悶悶且又忽兮似晦寂兮似無所止衆人皆有所爲我獨頑然似鄙其無憂之狀如此何以能然哉衆人方騖於學我獨絶之返乎無物之始而以自養也孔德之容惟道是從道之爲物惟恍惟惚惚兮恍兮其中有象恍兮惚兮其中有物窈兮冥兮其中有精其精甚真其中有信自古及今其名不去以閱衆甫吾何以知衆甫之然哉以此盛德者之容貌以爲道是從耳道體之妙何如乎道之爲物惟恍惟惚不可得而見也雖不可見然惚恍之中有象恍惚之中有物窈㝠之中有精其精甚真而不妄其中有信而可據也是道也自古及今其名不去以閱衆甫吾何以知衆甫爲道所閱哉正以道體恍惚窈㝠無可變滅故衆甫與化俱往而道自常存耳王純甫云閱歴也衆甫天地萬物凡自道而出者皆是也王輔嗣云閱自門出者一一而數之言道如門萬物皆自此往也曲則全枉則直窪則盈敝則新少則得多則惑是以聖人抱一爲天下式不自見故明不自是故彰不自伐故有功不自矜故長夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虗言哉誠全而歸之凡物之理曲者則可全枉者則可直窪者則可盈敝者則可新少者則可得多者則可惑此盈消息之一定者也是以聖人但抱一而不求多焉而已爲天下式矣不自表見其明故明不自是以求彰故彰不自伐其功故有功不自矜其長故長此皆不爭之道也夫唯不爭故天下莫能與之爭如謂猶有與之爭也古之所謂曲則全者豈虗言哉夫人亦患不能曲耳茍曲矣誠全而歸之物理斷不可誣也希言自然飄風不終朝驟雨不終日孰爲此者天地天地尚不能久而况於人乎故從事於道者道者同於道德者同於德失者同於失同於道者道亦樂得之同於德者德亦樂得之同於失者失亦樂得之信不足有不信人希簡其言因任自然而無容心則可矣飄風不終朝驟雨不終日此孰之爲乎天地也天地尚不能以飄驟者久而人乃欲以一已之辨智與異己者爭不亦難乎故從事於道者不然與道者遇即相忘於道與德者遇即相忘於德與失者遇亦相忘於失唯希言而已自然而已同於道者道者亦樂得之同於德者德者亦樂得之同於失者失者亦樂得之人無賢愚皆與相安信之故也使其信有不足焉則雖多言以爭之而猶不信也甚矣希言自然之足貴也跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道曰餘食贅行物或惡之故有道者不處者欲加髙於立而適不立跨者欲加於行而適不行世之自見以求明自是以求彰自伐其功自矜其長何以異此乎其於道也如食之餘如行之贅物或惡之矣故有道者不處也贅行之行焦氏云當作形古字通也有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以爲天下母吾不知其名字之曰道强爲之名曰大大曰逝逝曰逺逺曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然有物焉混然而成不知其所以成也先天地而生不知其所自始也其爲物也寂兮寥兮獨立無偶亘古今而不改周行於萬有而未嘗殆萬物無不由之而生可以爲天下母吾不知其名字之曰道强爲之名亦曰大而已矣其大也化而不有亦可曰逝其逝也周而無外亦可曰逺其逺也一念之間求而即得亦可曰反逝也逺也反也統以成其大而已矣故道大天大地大王亦大域中有四大而王居其一焉可不思所以全其大乎全之如何亦法地之無不載而已地之外有天亦法天之無不覆而已生天地者道亦法道之無不生無不成而已道本自然法道者亦法其自然而已末四句皆以人言泥其辭則難通矣重爲輕根靜爲躁君是以聖人終日行不離輺重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失根躁則失君凡物之重者常能資其輕者是重爲輕之根也物之靜者常能主其躁者是靜爲躁之君也是以聖人終日行不離輺重重以自持而不失於輕也雖有榮觀燕處其中而超然無累靜以自主而不失於躁也奈何有以萬乘之主而以身輕馳驅於天下之細故者乎是輕矣輕則失其所以爲根而無以爲之資矣是躁矣躁則失其所以爲君而無以爲之主矣輺重以衣車爲喻言不離其本也榮觀屋翼臺榭之屬亦以喻尊榮之位也善行無轍迹善言無瑕讁善計不用籌策善閉無關楗而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖智大迷是謂要妙人之善行者無轍迹行所宜行也善言者無瑕讁言所宜言也善計者不用籌策理必有至也善閉無關楗而不可開操得其要也善結無繩約而不可解衆所同欲也聖人有是善是以常以人治人是善救人故人各得其所而無棄人常因物付物是善救物故物各遂其生而無棄物是謂善用其明以治人物也夫天下之人善不善盡之善人不善人之師也不善人善人之資也知其爲師而貴之知其爲資而愛之則所以處善不善者各得矣是所謂善救人無棄人也不然而不貴其師不愛其資雖自以爲智實大迷而已夫此師與資之間即救人之要妙在善用之耳襲明襲傳襲也言以己之明之人物也一解如掩襲之襲言宻用其明也知其雄守其雌為天下谿為天下谿常徳不離復歸於嬰兒知其白守其黑為天下式為天下式常徳不忒復歸於無極知其榮守其辱爲天下谷爲天下谷常德乃足復歸於樸樸散則爲器聖人用之則爲官長故大制不割未嘗不知其雄而能用其剛也乃守其雌而以柔爲主是處其身於卑下而爲天下谿也爲天下谿則常德抱而不離而復歸於嬰兒之無我矣未嘗不知其白而能用明也乃守其黒而以晦爲主是其身常自俯仰而爲天下式也爲天下式則常德無少忒而復歸於無極之形矣未嘗不知其榮而能自高也乃守其辱而以退遜爲主是以其身含納垢濁而爲天下谷也爲天下谷則常充足而復歸於混成之樸矣樸者不可以一器名者也及其散則爲器器僅一官之守耳聖人用之則器反爲樸不爲官而爲官之長故以大道制天下者不事乎裁割之小數也式字諸說解作法愚意谿谷皆借用字則式字似亦謂車式耳測時之器亦曰式人自取正而我無心似之將欲取天下而爲之吾見其不得已天下神器不可爲也爲者敗之執者失之故物或行或隨或呴或吹或强或羸或載或隳是以聖人去甚去奢去泰將欲取天下而有所作爲有所執持以爲之吾見其不得而爲矣何也天下本神靈之重器不可以一人之私智强爲之也爲者斯敗之執者斯失之矣故天下之物或前行者或後隨者或呴以爲温者或吹以爲寒者或强而好勝者或羸而自守者或載而成者或隳而毁者材質不同取亦異欲以一人爲之執之難矣是以聖人因其自然而無容心但於其中去其甚者去其奢者去其泰者而已無餘事矣何必更有所爲哉以道佐人主者不以兵强天下其事好還師之所出荆棘生焉大兵之後必有凶年善者果而已不敢以取强果而勿矜果而勿伐果而勿驕果而不得已果而勿强物壯則老是謂不道不道早已以道佐人主者不以兵强取於天下夫兵之爲事好相還報師之所處荆棘生焉大兵之後必有凶年兵之爲害如此可以佐人主强天下乎所謂善用兵者在能自果斷而已耳不敢以之取强也其所果者如何果而勿矜也果而勿伐也果而勿驕也果而不得已也果而勿强也天下盈虗之理凡物之壯者則無不老以兵取强是謂恃壯而不道不道者必早已亦何能終强乎焦氏云不得已爲之難也果而勿矜以下五而字當讀如於字人方果於彼我獨果於此也夫佳兵者不祥之器物或惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下矣吉事尙左凶事尙右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之夫兵之佳者不祥之器也物或惡之故有道者不以其事自處也君子居則貴左用兵者則居右與君子道反因知兵者不祥之器非君子之器也茍其不得已而用之亦惟以恬淡爲上及其勝也亦不自以爲美使勝而以爲美是樂殺人也樂殺人者不可以得志於天下矣吉事尚左凶事尚右禮之定體也偏將軍居左上將軍居右是則以喪禮處之矣甚矣兵之爲不祥也凡軍禮殺敵衆多以悲哀泣之戰勝而歸以喪禮處之甚矣勝之非美而殺人之非所樂也恬淡安靜也道常無名樸雖小天下不敢臣侯王若能守萬物將自賔天地相合以降甘露人莫之令而自均始制有名名亦既有夫亦將知止知止所以不殆譬道之在天下猶川谷之於江海道以無名爲常但可謂之樸而已是樸也夷也希也微也可謂小矣樸雖小萬物皆自此生萬物皆自此處出何所不統天下豈有敢臣之者乎侯王若能守之則萬物將自賔其和氣所致天地相合以降甘露其盛德所孚人不待令而自均一守樸之效如此夫侯王之守樸也守其常無名者而已守其無名始可以制有名禮樂政刑之屬皆自此起然不可逐末而忘本也名亦既有夫亦將知止而不過無求多焉仍鎭以無名之樸而已知止如此所以無危殆之患也所以然者何也譬道之在天下猶川谷之於江海川谷以江海爲歸天下以道爲歸但恐人君不知守此樸耳知人者智自知者明勝人者有力自勝者强知足者富强行者有志不失其所者久死而不亡者壽知人之是非者謂之智自知其得失者謂之明能勝人者謂之有力自勝其私欲者謂之强知足而無求者謂之富强行道而不息者謂之有志物變無窮知其所而不爲所變者謂之久死生之變甚大雖死而未嘗亡者謂之壽智明力强以内外對言富而有志以能行知止對言久壽以不變於生不亡於死對言不失其所死而不亡皆守常道之效也大道汎兮其可左右萬物恃之以生而不辭功成不名有愛養萬物而不爲主常無欲可名於小萬物歸焉而不知主可名於大是以聖人終不爲大故能成其大大道之爲體汎兮其可以左可以右執一求之而不得也萬物恃之以生未嘗辭也生物之功既成又不自名以爲有愛養萬物矣而又不爲主自其常無欲言之希夷無形可名於小自其萬物歸焉而不知主言之容受無外可名於大道體之妙如此是以體道之聖人終不自以爲大也故能成其大執大象天下往往而不害安平泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既能執大象以御天下則天下皆歸往之矣天下皆往而我未嘗有所作爲而害之則往者無不安安而且平平而且泰矣此大道之爲用也若夫作樂設餌以待來者過客非不止也樂闋餌盡將之而去矣道之出口淡乎其無味也視之不足見聽之不足聞也及其用之則不可既豈樂與餌之比乎陸希聲云大象者道也蘇子由云道非有無故謂之大象樂餌蓋喻小惠悦物者將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明柔勝剛弱勝强魚不可脫於淵國之利器不可以示人天道之盈人事之倚伏皆有自然必至之勢如將欲歙之也必已張之矣將欲弱之也必已强之矣將欲廢之也必已興之矣將欲奪之也必已與之矣此其理至微也而實至明是謂微明大要柔者可以勝剛弱者可以勝强而已此理可以自養亦可以自藏是魚之深淵也此理可以禦患亦可以爲患是國之利器也魚不可脫於淵脫於淵則死之徒矣國之利器不可以示人示人則或竊之而爲害不勝言矣道常無爲而無不爲侯王若能守萬物將自化化而欲作吾將鎮之以無名之樸無名之樸亦將不欲不欲以靜天下將自正道體本無而應用則有故常無爲而無不爲侯王若能守此道其於天下亦以無爲此爲之萬物將自化而順此無爲之治矣萬物既化茍有欲起而生其智巧者吾亦將以無名之樸鎮定之且並此無名之樸亦將不欲守道至此可謂一無所欲而真能靜矣天下有不各返於不欲而自正者乎老子說畧卷上
